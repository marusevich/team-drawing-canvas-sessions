<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Drawing Canvas 🐱</title>
<style>
  :root {
    --bg: #f6f7fb;
    --panel: #ffffff;
    --border: #e4e6ef;
    --text: #1c1e26;
    --muted: #6b7280;
    --accent: #5b6cff;
    --accent-dark: #3d4be0;
    --danger: #e25c5c;
    --ok: #2bb673;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
    width: 100%;
    max-width: 760px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .subtitle { color: var(--muted); margin: 0 0 18px; font-size: 14px; }

  /* Join screen */
  .setup { display: flex; flex-direction: column; gap: 10px; }
  .join-screen, .session-row { display: flex; gap: 8px; }
  .join-screen input, .session-row input {
    flex: 1; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 8px; outline: none;
  }
  .join-screen input:focus, .session-row input:focus { border-color: var(--accent); }
  .session-summary {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 10px 12px; background: #fafbff; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 13px;
  }
  .session-summary strong { color: var(--text); }
  button {
    cursor: pointer; border: none; border-radius: 8px;
    padding: 10px 14px; font-size: 14px; font-weight: 500;
    background: var(--accent); color: white; transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent-dark); }
  button:disabled { background: #cdd0e1; cursor: not-allowed; }
  button.secondary { background: #ececf4; color: var(--text); }
  button.secondary:hover:not(:disabled) { background: #dcdde8; }
  button.danger { background: var(--danger); }
  button.danger:hover:not(:disabled) { background: #c54545; }
  button.ok { background: var(--ok); }
  button.ok:hover:not(:disabled) { background: #229960; }

  /* Game screen */
  .game { display: none; flex-direction: column; gap: 14px; }
  .game.active { display: flex; }

  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    padding: 12px; background: #fafbff; border: 1px solid var(--border);
    border-radius: 10px;
  }
  .toolbar label { font-size: 13px; color: var(--muted); }
  .colors { display: flex; gap: 6px; }
  .swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: var(--text); }
  .brush-control { display: flex; align-items: center; gap: 8px; }
  .brush-control input[type=range] { width: 100px; }

  .stage {
    position: relative;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    width: 600px; height: 400px; max-width: 100%;
    background: white; margin: 0 auto;
  }
  canvas { display: block; cursor: crosshair; touch-action: none; }
  canvas.locked { cursor: not-allowed; }

  .lock-banner {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center; pointer-events: none;
    background: rgba(255,255,255,0.0);
  }
  .lock-banner.visible { display: flex; }
  .lock-banner span {
    background: rgba(28,30,38,0.85); color: white;
    padding: 8px 14px; border-radius: 20px; font-size: 13px;
  }

  .status-bar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    justify-content: space-between; font-size: 14px;
  }
  .turn-info { color: var(--muted); }
  .turn-info strong { color: var(--text); }
  .my-turn { color: var(--ok); font-weight: 600; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; }

  .players {
    display: flex; flex-wrap: wrap; gap: 6px;
    font-size: 13px; color: var(--muted);
  }
  .players .pill {
    background: #ececf4; padding: 4px 10px; border-radius: 12px;
  }
  .players .pill.current {
    background: var(--accent); color: white;
  }
  .players .pill.me::after { content: " (you)"; opacity: 0.7; }
</style>
</head>
<body>
<div class="app">
  <h1>🐱 Team Drawing Canvas</h1>
  <p class="subtitle">Each player draws one stroke at a time. Goal — draw a cat together.</p>

  <!-- Join screen -->
  <div class="setup" id="joinScreen">
    <div class="session-row">
      <input id="sessionInput" type="text" placeholder="Session code" maxlength="40" />
      <button id="createSessionBtn" class="secondary">New session</button>
    </div>
    <div class="session-summary" id="sessionSummary" hidden>
      <span>Session: <strong id="activeSessionCode"></strong></span>
      <button id="copySessionBtn" class="secondary">Copy link</button>
      <button id="changeSessionBtn" class="secondary">Change</button>
    </div>
    <div class="join-screen" id="nameJoinRow" hidden>
      <input id="nameInput" type="text" placeholder="Your name…" maxlength="30" autofocus />
      <button id="joinBtn">Join</button>
    </div>
  </div>

  <!-- Game screen -->
  <div class="game" id="gameScreen">
    <div class="toolbar">
      <div class="colors" id="colors">
        <!-- color swatches injected by JS -->
      </div>
      <div class="brush-control">
        <label>Brush</label>
        <input id="brushSize" type="range" min="2" max="24" value="6" />
        <span id="brushSizeLabel">6</span>
      </div>
    </div>

    <div class="stage">
      <canvas id="canvas" width="600" height="400"></canvas>
      <div class="lock-banner" id="lockBanner"><span id="lockText">Waiting for your turn…</span></div>
    </div>

    <div class="status-bar">
      <div class="turn-info" id="turnInfo">…</div>
      <div>Session: <strong id="sessionCodeLabel">…</strong></div>
      <div>Strokes: <strong id="strokeCount">0</strong></div>
    </div>

    <div class="players" id="players"></div>

    <div class="actions">
      <button id="doneBtn" class="ok" disabled>Done — pass it on</button>
      <button id="undoBtn" class="secondary">Undo</button>
      <button id="clearBtn" class="danger">Clear all</button>
      <button id="saveBtn" class="secondary">💾 Save image</button>
    </div>
  </div>
</div>

<script type="module" src="./app.js?v=20260522-session-ui"></script>
</body>
</html>
